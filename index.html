<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Rifa</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <img src="cotinha.png" alt="Logo Jardim Cotinha" class="logo-topo">

<div class="container">
    <h1>🔎 Consulta da Rifa</h1>
    <p class="subtitle">Insira o número para verificar o comprador</p>

    <div class="search-box">
        <input type="number" id="numero" placeholder="Digite o número (1 a 100)" min="1" max="100" onkeydown="if(event.key === 'Enter') buscar()">
        <button onclick="buscar()">Buscar</button>
    </div>

    <div id="resultado"></div>
</div>

<script src="index.js"></script>
</body>
</html>
